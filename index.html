<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarKod - Akıllı Market Asistanı</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HBPDZKSWJ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HBPDZKSWJ2');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">

    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        
        <div class="mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 text-white rounded-3xl shadow-2xl mb-4 animate-bounce">
                <i class="fa-solid fa-barcode text-4xl"></i>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">
                Mar<span class="text-indigo-600">Kod</span>
            </h1>
            <p class="mt-4 text-lg text-slate-600 max-w-md mx-auto">
                Market fiyatlarını karşılaştırın, bütçenizi koruyun. 
                <br><span class="font-semibold text-indigo-500">Uygulamaya yönlendiriliyorsunuz...</span>
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-4xl w-full mb-12">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <i class="fa-solid fa-magnifying-glass text-indigo-500 mb-2"></i>
                <h3 class="font-bold">Barkod Tara</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <i class="fa-solid fa-tags text-indigo-500 mb-2"></i>
                <h3 class="font-bold">Fiyat Karşılaştır</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <i class="fa-solid fa-bolt text-indigo-500 mb-2"></i>
                <h3 class="font-bold">Anlık Veri</h3>
            </div>
        </div>

        <div class="w-full max-w-xs bg-slate-200 h-2 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-[5000ms] ease-linear" style="width: 0%"></div>
        </div>
        <p class="mt-4 text-sm text-slate-400 text-shadow-none">Lütfen bekleyiniz, Google Play Store açılıyor.</p>

    </div>

    <script>
        window.onload = function() {
            document.getElementById('progress-bar').style.width = '100%';
        };

        const urlParams = new URLSearchParams(window.location.search);
        const myReferrer = urlParams.get('referrer') || 'root_direct';

        // GA4 Etkinliği Gönder (Yeni kod ile)
        gtag('event', 'app_redirection', {
            'referrer_id': myReferrer,
            'source': 'root_landing_page'
        });

        console.log("Parametre: " + myReferrer + ". Yönlendiriliyorsunuz...");

        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=com.cagatayerturk.markod&hl=tr";
        }, 5000);
    </script>
</body>
</html>
