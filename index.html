<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F8J0MLF2C5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-F8J0MLF2C5');
    </script>

    <title>Cagatay ERTURK - Profile Page</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .social-link { @apply flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg transition-all duration-300; @apply hover:bg-indigo-500 hover:text-white hover:shadow-lg; text-decoration: none; }
        .skill-badge { @apply bg-indigo-100 text-indigo-800 text-sm font-medium px-4 py-2 rounded-full transition-all duration-300; @apply hover:bg-indigo-200 hover:scale-105; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased">

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myReferrer = urlParams.get('referrer');

        if (myReferrer) {
            // Etkinliği gönder
            gtag('event', 'app_redirection', {
                'referrer_id': myReferrer,
                'page_path': window.location.pathname
            });

            console.log("Parametre algılandı: " + myReferrer + ". Yönlendiriliyorsunuz...");

            // Analytics'e zaman tanımak için 2 saniye bekle ve yönlendir
            setTimeout(function() {
                window.location.href = "https://play.google.com/store/apps/details?id=com.cagatayerturk.markod";
            }, 2000);
        }
    </script>
</body>
</html>
