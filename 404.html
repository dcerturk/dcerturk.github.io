<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarKod - Ürün Detaylarına Yönlendiriliyorsunuz</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F8J0MLF2C5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-F8J0MLF2C5');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">

    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        
        <div class="mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 text-white rounded-3xl shadow-2xl mb-4 animate-pulse">
                <i class="fa-solid fa-cart-shopping text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">
                Ürün Detayı Bulunuyor...
            </h1>
            <p class="mt-4 text-lg text-slate-600 max-w-md mx-auto">
                Seçtiğiniz ürünün güncel fiyatlarını görmek için <br>
                <span class="font-semibold text-indigo-600">MarKod uygulamasına aktarılıyorsunuz.</span>
            </p>
        </div>

        <div class="w-full max-w-xs bg-slate-200 h-2 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-[5000ms] ease-linear" style="width: 0%"></div>
        </div>
        <p class="mt-4 text-sm text-slate-400">Yükleniyor, lütfen bekleyiniz...</p>

    </div>

    <script>
        window.onload = function() {
            document.getElementById('progress-bar').style.width = '100%';
        };

        // URL'deki bilgileri ve parametreleri yakalayalım
        const urlParams = new URLSearchParams(window.location.search);
        const myReferrer = urlParams.get('referrer') || 'direct_share'; // Parametre yoksa 'direct_share' yazar
        const currentPath = window.location.pathname; // Hangi barkod tıklandı?

        // GA4 Etkinliği Gönder
        gtag('event', 'product_link_click', {
            'referrer_id': myReferrer,
            'barcode_path': currentPath,
            'source': '404_redirect_page'
        });

        console.log("Ürün yolu: " + currentPath + " | Referrer: " + myReferrer);

        // 5 Saniye sonra Play Store'a uçur
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=com.cagatayerturk.markod";
        }, 5000);
    </script>
</body>
</html>
